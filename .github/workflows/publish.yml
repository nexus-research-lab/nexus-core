name: Publish Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "要发布的 Git tag，例如 v0.0.1"
        required: true
        type: string

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  macos_app:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Resolve Tag
        id: tag
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            TAG="${{ github.event.inputs.tag }}"
          else
            TAG="${GITHUB_REF_NAME}"
          fi

          VERSION="${TAG#v}"
          echo "tag=${TAG}" >> "${GITHUB_OUTPUT}"
          echo "version=${VERSION}" >> "${GITHUB_OUTPUT}"

      - name: Checkout Tag
        run: |
          git checkout "${{ steps.tag.outputs.tag }}"

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: "22"

      - name: Setup pnpm
        run: |
          corepack enable
          corepack prepare pnpm@9.15.2 --activate

      - name: Build macOS DMG
        env:
          NEXUS_DESKTOP_APP_BUILD_DIR: ${{ runner.temp }}/macos-app
          NEXUS_DESKTOP_PACKAGE_OUTPUT_DIR: ${{ runner.temp }}/macos-artifacts
          NEXUS_DESKTOP_PACKAGE_FORMAT: dmg
          NEXUS_DESKTOP_VERSION: ${{ steps.tag.outputs.version }}
          NEXUS_DESKTOP_BUILD_NUMBER: ${{ github.run_number }}
          NEXUS_DESKTOP_SMOKE_ALLOW_FALLBACK: "1"
          NEXUS_DESKTOP_SMOKE_MAIN_TIMEOUT_SECONDS: "45"
          NEXUS_DESKTOP_SMOKE_LAUNCHER_TIMEOUT_SECONDS: "30"
        run: |
          scripts/desktop/package-macos-app.sh

      - name: Upload macOS App Assets
        uses: actions/upload-artifact@v7
        with:
          name: nexus-${{ steps.tag.outputs.tag }}-macos-app
          if-no-files-found: error
          path: |
            ${{ runner.temp }}/macos-artifacts/Nexus-macos-*.dmg
            ${{ runner.temp }}/macos-artifacts/Nexus-macos-*.dmg.sha256
            ${{ runner.temp }}/macos-artifacts/Nexus-macos-*.dmg.metadata.json

  windows_app:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Resolve Tag
        id: tag
        shell: pwsh
        run: |
          if ("${{ github.event_name }}" -eq "workflow_dispatch") {
            $tag = "${{ github.event.inputs.tag }}"
          } else {
            $tag = "${env:GITHUB_REF_NAME}"
          }

          $version = $tag -replace "^v", ""
          "tag=$tag" >> $env:GITHUB_OUTPUT
          "version=$version" >> $env:GITHUB_OUTPUT

      - name: Checkout Tag
        shell: pwsh
        run: |
          git checkout "${{ steps.tag.outputs.tag }}"

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: "8.0.x"

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: "22"

      - name: Setup pnpm
        shell: pwsh
        run: |
          corepack enable
          corepack prepare pnpm@9.15.2 --activate

      - name: Install Inno Setup
        shell: pwsh
        run: |
          choco install innosetup --no-progress -y

      - name: Build Windows App Package
        shell: pwsh
        env:
          NEXUS_DESKTOP_APP_BUILD_DIR: ${{ runner.temp }}\windows-app\Nexus
          NEXUS_DESKTOP_PACKAGE_OUTPUT_DIR: ${{ runner.temp }}\windows-artifacts
          NEXUS_DESKTOP_VERSION: ${{ steps.tag.outputs.version }}
          NEXUS_DESKTOP_BUILD_NUMBER: ${{ github.run_number }}
          NEXUS_DESKTOP_SMOKE_TIMEOUT_SECONDS: "75"
        run: |
          pwsh -NoLogo -NoProfile -ExecutionPolicy Bypass -File scripts/desktop/package-windows-app.ps1

      - name: Upload Windows App Assets
        uses: actions/upload-artifact@v7
        with:
          name: nexus-${{ steps.tag.outputs.tag }}-windows-app
          if-no-files-found: error
          path: |
            ${{ runner.temp }}/windows-artifacts/Nexus-windows-*.zip
            ${{ runner.temp }}/windows-artifacts/Nexus-windows-*.zip.sha256
            ${{ runner.temp }}/windows-artifacts/Nexus-windows-*.zip.metadata.json
            ${{ runner.temp }}/windows-artifacts/NexusSetup-*.exe
            ${{ runner.temp }}/windows-artifacts/NexusSetup-*.exe.sha256

  release:
    needs:
      - macos_app
      - windows_app
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Resolve Tag
        id: tag
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            TAG="${{ github.event.inputs.tag }}"
          else
            TAG="${GITHUB_REF_NAME}"
          fi

          VERSION="${TAG#v}"
          echo "tag=${TAG}" >> "${GITHUB_OUTPUT}"
          echo "version=${VERSION}" >> "${GITHUB_OUTPUT}"

      - name: Checkout Tag
        run: |
          git checkout "${{ steps.tag.outputs.tag }}"

      - name: Extract Release Notes
        id: notes
        run: |
          VERSION="${{ steps.tag.outputs.version }}"

          awk -v version="${VERSION}" '
            $0 ~ "^## \\[" version "\\] - " {
              capture = 1
            }
            capture && $0 ~ "^## " && $0 !~ "^## \\[" version "\\] - " {
              exit
            }
            capture {
              print
            }
          ' CHANGELOG.md > release_notes.md

          if [ ! -s release_notes.md ]; then
            echo "未在 CHANGELOG.md 中找到版本 ${VERSION} 的发布说明"
            exit 1
          fi

      - name: Package Release Assets
        run: |
          TAG="${{ steps.tag.outputs.tag }}"
          STAGE_DIR="${RUNNER_TEMP}/nexus-release"
          SOURCE_DIR="${STAGE_DIR}/nexus-${TAG}"
          ARTIFACT_DIR="${RUNNER_TEMP}/artifacts"

          rm -rf "${STAGE_DIR}" "${ARTIFACT_DIR}"
          mkdir -p "${SOURCE_DIR}" "${ARTIFACT_DIR}"

          git archive "${TAG}" | tar -x -C "${SOURCE_DIR}"

          tar -czf "${ARTIFACT_DIR}/nexus-${TAG}.tar.gz" -C "${STAGE_DIR}" "nexus-${TAG}"

          sha256sum "${ARTIFACT_DIR}/nexus-${TAG}.tar.gz" > "${ARTIFACT_DIR}/nexus-${TAG}.sha256"

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: "22"

      - name: Setup pnpm
        run: |
          corepack enable
          corepack prepare pnpm@9.15.2 --activate

      - name: Install Packaging Tools
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends rsync zip

      - name: Install Frontend Dependencies
        run: |
          cd web
          pnpm install --frozen-lockfile

      - name: Build Frontend
        run: |
          cd web
          pnpm run build

      - name: Build Runnable Release Packages
        env:
          NEXUS_RELEASE_OUTPUT_DIR: ${{ runner.temp }}/artifacts
          NEXUS_RELEASE_SKIP_PNPM_INSTALL: "1"
          NEXUS_RELEASE_SKIP_WEB_BUILD: "1"
        run: |
          for target in linux-amd64 linux-arm64 windows-amd64; do
            NEXUS_RELEASE_TARGET="${target}" ./scripts/package-release.sh "${{ steps.tag.outputs.version }}"
          done

      - name: Download macOS App Assets
        uses: actions/download-artifact@v7
        with:
          name: nexus-${{ steps.tag.outputs.tag }}-macos-app
          path: ${{ runner.temp }}/artifacts

      - name: Download Windows App Assets
        uses: actions/download-artifact@v7
        with:
          name: nexus-${{ steps.tag.outputs.tag }}-windows-app
          path: ${{ runner.temp }}/artifacts

      - name: Upload Release Assets
        uses: actions/upload-artifact@v7
        with:
          name: nexus-${{ steps.tag.outputs.tag }}
          if-no-files-found: error
          path: |
            ${{ runner.temp }}/artifacts/nexus-${{ steps.tag.outputs.tag }}*.tar.gz
            ${{ runner.temp }}/artifacts/nexus-${{ steps.tag.outputs.tag }}*.zip
            ${{ runner.temp }}/artifacts/nexus-${{ steps.tag.outputs.tag }}*.sha256
            ${{ runner.temp }}/artifacts/Nexus-macos-*.dmg
            ${{ runner.temp }}/artifacts/Nexus-macos-*.dmg.sha256
            ${{ runner.temp }}/artifacts/Nexus-macos-*.dmg.metadata.json
            ${{ runner.temp }}/artifacts/Nexus-windows-*.zip
            ${{ runner.temp }}/artifacts/Nexus-windows-*.zip.sha256
            ${{ runner.temp }}/artifacts/Nexus-windows-*.zip.metadata.json
            ${{ runner.temp }}/artifacts/NexusSetup-*.exe
            ${{ runner.temp }}/artifacts/NexusSetup-*.exe.sha256

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          name: ${{ steps.tag.outputs.tag }}
          body_path: release_notes.md
          generate_release_notes: false
          files: |
            ${{ runner.temp }}/artifacts/nexus-${{ steps.tag.outputs.tag }}*.tar.gz
            ${{ runner.temp }}/artifacts/nexus-${{ steps.tag.outputs.tag }}*.zip
            ${{ runner.temp }}/artifacts/nexus-${{ steps.tag.outputs.tag }}*.sha256
            ${{ runner.temp }}/artifacts/Nexus-macos-*.dmg
            ${{ runner.temp }}/artifacts/Nexus-macos-*.dmg.sha256
            ${{ runner.temp }}/artifacts/Nexus-macos-*.dmg.metadata.json
            ${{ runner.temp }}/artifacts/Nexus-windows-*.zip
            ${{ runner.temp }}/artifacts/Nexus-windows-*.zip.sha256
            ${{ runner.temp }}/artifacts/Nexus-windows-*.zip.metadata.json
            ${{ runner.temp }}/artifacts/NexusSetup-*.exe
            ${{ runner.temp }}/artifacts/NexusSetup-*.exe.sha256
