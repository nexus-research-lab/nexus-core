x-logging:
  logging: &default-logging
    driver: "local"
    options:
      max-size: "10m"
      max-file: "3"


services:
  nexus:
    build:
      context: ..
      dockerfile: deploy/Dockerfile
    image: ${IMAGE:-nexus}:app-${TAG}
    restart: always
    environment:
      - TZ=Asia/Shanghai
      - SERVER_TYPE=gunicorn
    networks:
      - net
    volumes:
      - /usr/share/zoneinfo/Asia/Shanghai:/etc/localtime:ro
      - ../logs:/opt/app/logs
      - ../cache:/opt/app/cache
      - ${DEFAULT_CWD:-cwd}:/opt/app/playground
    env_file:
      - ../.env
    logging: *default-logging

  # 前端服务
  web:
    build:
      context: ../web
      dockerfile: Dockerfile
      args:
        - VITE_WS_URL=ws://localhost/agent/v1/chat/ws
        - VITE_API_URL=http://localhost/agent/v1
        - VITE_DEFAULT_MODEL=glm-5
    image: ${IMAGE:-nexus}:web-${TAG}
    restart: always
    environment:
      - TZ=Asia/Shanghai
    networks:
      - net
    volumes:
      - /usr/share/zoneinfo/Asia/Shanghai:/etc/localtime:ro
    logging: *default-logging
    depends_on:
      - nexus


  # Nginx 反向代理
  nginx:
    image: nginx:alpine
    restart: always
    environment:
      - TZ=Asia/Shanghai
    networks:
      - net
    volumes:
      - /usr/share/zoneinfo/Asia/Shanghai:/etc/localtime:ro
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      - nexus
      - web
    logging: *default-logging

networks:
  net:
    external: true

volumes:
  cwd:
