x-logging:
  logging: &default-logging
    driver: "local"
    options:
      max-size: "10m"
      max-file: "3"

services:
  nexus:
    build:
      context: ..
      dockerfile: deploy/Dockerfile
      additional_contexts:
        nexus_agent_sdk: ${NEXUS_AGENT_SDK_DIR:-../../nexus-agent-sdk/nexus-agent-sdk-go}
      cache_from:
        - type=local,src=../.buildx-cache/nexus
      cache_to:
        - type=local,dest=../.buildx-cache/nexus,mode=max
      args:
        APT_MIRROR: ${APT_MIRROR:-http://mirrors.tuna.tsinghua.edu.cn}
        DEBIAN_SECURITY_MIRROR: ${DEBIAN_SECURITY_MIRROR:-http://mirrors.tuna.tsinghua.edu.cn/debian-security}
        GOPROXY: ${GOPROXY:-https://goproxy.cn,direct}
        PNPM_REGISTRY: ${PNPM_REGISTRY:-https://registry.npmmirror.com/}
        PNPM_VERSION: ${PNPM_VERSION:-9.15.2}
        PIP_INDEX_URL: ${PIP_INDEX_URL:-https://pypi.tuna.tsinghua.edu.cn/simple}
        BUN_CONFIG_REGISTRY: ${BUN_CONFIG_REGISTRY:-https://registry.npmmirror.com/}
        PRIVATE_SDK_MODULE: ${PRIVATE_SDK_MODULE:-github.com/nexus-research-lab/nexus-agent-sdk-go}
    image: ${IMAGE:-nexus}:app-${TAG:-latest}
    restart: unless-stopped
    env_file:
      - ../.env
    environment:
      TZ: ${TZ:-Asia/Shanghai}
      HOST: 0.0.0.0
      PORT: 8010
      PNPM_REGISTRY: ${PNPM_REGISTRY:-https://registry.npmmirror.com/}
      BUN_CONFIG_REGISTRY: ${BUN_CONFIG_REGISTRY:-https://registry.npmmirror.com/}
      PIP_INDEX_URL: ${PIP_INDEX_URL:-https://pypi.tuna.tsinghua.edu.cn/simple}
      UV_DEFAULT_INDEX: ${UV_DEFAULT_INDEX:-https://pypi.tuna.tsinghua.edu.cn/simple}
      UV_INDEX_URL: ${UV_INDEX_URL:-https://pypi.tuna.tsinghua.edu.cn/simple}
      NEXUS_APT_ALLOWLIST: ${NEXUS_APT_ALLOWLIST:-ca-certificates curl ffmpeg git imagemagick iputils-ping jq less procps ripgrep rsync unzip vim wget zip}
      DATABASE_DRIVER: ${DATABASE_DRIVER:-sqlite}
      DATABASE_URL: ${DATABASE_URL:-sqlite:////home/agent/.nexus/data/nexus.db}
      CACHE_FILE_DIR: ${CACHE_FILE_DIR:-/home/agent/.nexus/cache}
      LOG_PATH: ${LOG_PATH:-/home/agent/.nexus/logs/logger.log}
      WORKSPACE_PATH: ${WORKSPACE_PATH:-/home/agent/.nexus/workspace}
    volumes:
      - ${HOST_DATA_DIR:-./data}/.nexus:/home/agent/.nexus
      - ${HOST_DATA_DIR:-./data}/.claude.json:/home/agent/.claude.json
    expose:
      - "8010"
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:8010/nexus/v1/health >/dev/null || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 20s
    logging: *default-logging

  nginx:
    build:
      context: ..
      dockerfile: web/Dockerfile
      cache_from:
        - type=local,src=../.buildx-cache/nginx
      cache_to:
        - type=local,dest=../.buildx-cache/nginx,mode=max
      args:
        APK_MIRROR: ${APK_MIRROR:-https://mirrors.tuna.tsinghua.edu.cn/alpine}
        PNPM_REGISTRY: ${PNPM_REGISTRY:-https://registry.npmmirror.com/}
        PNPM_VERSION: ${PNPM_VERSION:-9.15.2}
        VITE_WS_URL: ${VITE_WS_URL:-}
        VITE_API_URL: ${VITE_API_URL:-}
    image: ${IMAGE:-nexus}:web-${TAG:-latest}
    restart: unless-stopped
    environment:
      TZ: ${TZ:-Asia/Shanghai}
    depends_on:
      nexus:
        condition: service_healthy
    ports:
      - "${HTTP_PORT:-80}:80"
      - "${HTTPS_PORT:-443}:443"
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://127.0.0.1/nginx-health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 10s
    logging: *default-logging
