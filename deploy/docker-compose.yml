x-logging:
  logging: &default-logging
    driver: "local"
    options:
      max-size: "10m"
      max-file: "3"

services:
  nexus:
    build:
      context: ..
      dockerfile: deploy/Dockerfile
      args:
        APT_MIRROR: ${APT_MIRROR:-https://mirrors.tuna.tsinghua.edu.cn}
        DEBIAN_SECURITY_MIRROR: ${DEBIAN_SECURITY_MIRROR:-https://mirrors.tuna.tsinghua.edu.cn/debian-security}
        PIP_INDEX_URL: ${PIP_INDEX_URL:-https://pypi.tuna.tsinghua.edu.cn/simple}
        NPM_REGISTRY: ${NPM_REGISTRY:-https://registry.npmmirror.com/}
    image: ${IMAGE:-nexus}:app-${TAG:-latest}
    restart: unless-stopped
    env_file:
      - ../.env
    environment:
      TZ: ${TZ:-Asia/Shanghai}
      SERVER_TYPE: gunicorn
      HOST: 0.0.0.0
      PORT: 8010
      WORKERS: ${WORKERS:-2}
      DATABASE_URL: ${DATABASE_URL:-sqlite+aiosqlite:////home/agent/.nexus/data/nexus.db}
      CACHE_FILE_DIR: ${CACHE_FILE_DIR:-/home/agent/.nexus/cache}
      LOG_PATH: ${LOG_PATH:-/home/agent/.nexus/logs}
      WORKSPACE_PATH: ${WORKSPACE_PATH:-/home/agent/.nexus/workspace}
    volumes:
      - nexus_home:/home/agent/.nexus
    expose:
      - "8010"
    healthcheck:
      test: ["CMD", "python", "-c", "from urllib.request import urlopen; urlopen('http://127.0.0.1:8010/agent/v1/health').read()"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 20s
    logging: *default-logging

  nginx:
    build:
      context: ..
      dockerfile: web/Dockerfile
      args:
        APK_MIRROR: ${APK_MIRROR:-https://mirrors.tuna.tsinghua.edu.cn/alpine}
        NPM_REGISTRY: ${NPM_REGISTRY:-https://registry.npmmirror.com/}
        VITE_WS_URL: ${VITE_WS_URL:-}
        VITE_API_URL: ${VITE_API_URL:-}
        VITE_DEFAULT_MODEL: ${VITE_DEFAULT_MODEL:-glm-5}
    image: ${IMAGE:-nexus}:web-${TAG:-latest}
    restart: unless-stopped
    environment:
      TZ: ${TZ:-Asia/Shanghai}
    depends_on:
      nexus:
        condition: service_healthy
    ports:
      - "${HTTP_PORT:-80}:80"
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://127.0.0.1/nginx-health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 10s
    logging: *default-logging

volumes:
  nexus_home:
